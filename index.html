<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Memoria - Payasitos</title>
    <style>
        body {
            margin: 0; background: white; color: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden; font-family: sans-serif;
        }
        #game-container {
            position: relative; width: 90%; max-width: 500px;
            aspect-ratio: 1 / 1;
        }
        canvas {
            background: white; width: 100%; height: 100%;
            touch-action: none; image-rendering: pixelated;
        }
        .ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 20px;
            box-sizing: border-box;
            opacity: 1; transition: opacity 0.5s;
        }
        .hidden { display: none !important; opacity: 0; }
 
        h2 { font-size: 1.5em; color: #000000 }
        
        #ui-start {
            background: white !important;
        }
        
        #ui-level {
            background: white !important;
        }
        
        #ui-next {
            background: hsla(0, 0%, 100%, 0.85) !important;
        }

        #ui-end {
            background: hsla(0, 0%, 100%, 0.85) !important;
        }
        
        #attempts-counter {
            display: none;
        }
        
        #attempts-counter.visible {
            display: block;
        }
        
        #level-indicator {
            display: none;
        }
        
        #level-indicator.visible {
            display: block;
        }
        
        #reset-button {
            display: none;
        }
        
        #reset-button.visible {
            display: flex !important;
        }
    </style>
</head>
<body>

<div id="attempts-counter" style="position: fixed; top: calc(50% - 310px); left: 50%; transform: translateX(-50%); font-size: 2em; font-weight: bold; color: #da0301; z-index: 100;">Intentos: 0</div>

<div id="level-indicator" style="position: fixed; bottom: calc(50% - 320px); left: 50%; transform: translateX(-50%); z-index: 100; max-width: 200px;">
    <img id="level-indicator-img" src="" alt="Level" style="max-width: 100%;">
</div>

<div id="reset-button" style="position: fixed; top: 20px; right: 20px; font-size: 36px; font-weight: bold; color: #000; cursor: pointer; z-index: 101; user-select: none;" onclick="resetGame()">×</div>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>

    <div id="ui-loading" class="ui-layer">
        <h2>Un momentito por favor...</h2>
    </div>

    <div id="ui-start" class="ui-layer hidden">
        <img id="title-img" src="img/game-logo.png" alt="Title" style="max-width: 80%; margin-bottom: 20px;">
        <h2>Encuentra los pares de alfajores en la menor cantidad de intentos.</h2>
        <img id="jugar-img" src="img/jugar.png" alt="Jugar" style="max-width: 70%; cursor: pointer;" onclick="startGame()">
    </div>

    <div id="ui-level" class="ui-layer hidden">
        <img id="level-img" src="" alt="Level" style="max-width: 80%;">
    </div>

    <div id="ui-next" class="ui-layer hidden">
        <img id="done-img" src="img/done.png" alt="Done" style="max-width: 80%; margin-bottom: 30px;">
        <img id="siguiente-img" src="img/siguiente.png" alt="Siguiente" style="max-width: 70%; cursor: pointer;" onclick="nextLevel()">
    </div>

    <div id="ui-end" class="ui-layer hidden">
        <img id="done-img" src="img/felicitaciones.png" alt="Done" style="max-width: 80%; margin-bottom: 30px;">
        <h2>Lo lograste en <span id="total-attempts">0</span> intentos.</h2>
        <img id="done-img" onclick="resetGame()" src="img/gracias.png" alt="Done" style="max-width: 80%; margin-bottom: 30px;">
    </div>
</div>

<script type="module" src="/src/game.js"></script>
</body>
</html>
