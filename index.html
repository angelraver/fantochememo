<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Memoria - Payasitos</title>
    <style>
        body {
            margin: 0; background: #2c3e50; color: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden; font-family: 'Courier New', Courier, monospace; /* Fuente más pixel */
        }
        #game-container {
            position: relative; width: 90%; max-width: 500px; /* Responsivo */
            aspect-ratio: 1 / 1;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        canvas {
            background: #34495e; border-radius: 8px; width: 100%; height: 100%;
            touch-action: none; image-rendering: pixelated; /* Optimización para pixel art */
        }
        .ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.85); border-radius: 8px; text-align: center; padding: 20px;
            box-sizing: border-box;
            opacity: 1; transition: opacity 0.5s;
        }
        .hidden { display: none !important; opacity: 0; }
        
        button {
            padding: 15px 30px; cursor: pointer; background: #e74c3c; color: white;
            border: 4px solid #b03a2e; border-radius: 8px; font-size: 1.2em;
            font-family: inherit; text-transform: uppercase;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.95); }
        
        h1 { font-size: 2em; color: #f1c40f; text-shadow: 2px 2px #c0392b; }
        h2 { font-size: 1.5em; color: #2ecc71; }
        p { font-size: 1em; color: #ecf0f1; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>

    <div id="ui-start" class="ui-layer">
        <h1>Payasitos Memory</h1>
        <p>Encuentra las parejas antes de que se acabe el tiempo.</p>
        <button onclick="startGame()">¡Vamos a jugar!</button>
    </div>

    <div id="ui-next" class="ui-layer hidden">
        <h2>¡Bien hecho!</h2>
        <p id="level-report"></p>
        <button onclick="nextLevel()">Siguiente Nivel</button>
    </div>

    <div id="ui-end" class="ui-layer hidden">
        <h1>¡Felicitaciones!</h1>
        <p>Lograste completar el juego de los payasitos.</p>
        <button onclick="resetGame()">Jugar de nuevo</button>
    </div>
</div>

<script>
// --- CONFIGURACIÓN Y ASSETS ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
// Desactivar suavizado para pixel art
ctx.imageSmoothingEnabled = false; 

// Capas UI
const uiStart = document.getElementById('ui-start');
const uiNext = document.getElementById('ui-next');
const uiEnd = document.getElementById('ui-end');
const levelReportText = document.getElementById('level-report');

let level = 1;
let cards = [];
let selected = [];
let canClick = false;
let imagesLoaded = 0;
let gameState = 'MENU'; // MENU, PLAYING, LEVEL_WIN, GAME_OVER

// Generación de Placeholders Pixel Art (Payasitos Tiernos)
const clownColors = ['#FF5733', '#33FF57', '#3357FF', '#FF33A8', '#33FFF5', '#F5FF33', '#FF8C33', '#8C33FF'];
const clownImages = [];

function createClownPlaceholders() {
    for (let i = 0; i < 8; i++) {
        const imgCanvas = document.createElement('canvas');
        imgCanvas.width = 32; imgCanvas.height = 32;
        const ictx = imgCanvas.getContext('2d');
        ictx.imageSmoothingEnabled = false;

        const color = clownColors[i];
        
        // Pelo
        ictx.fillStyle = color;
        ictx.fillRect(4, 2, 24, 8); ictx.fillRect(2, 4, 28, 10);
        // Cara
        ictx.fillStyle = '#FFF1E0';
        ictx.fillRect(6, 10, 20, 16);
        // Ojos (Kawai)
        ictx.fillStyle = '#000';
        ictx.fillRect(10, 14, 2, 4); ictx.fillRect(20, 14, 2, 4);
        ictx.fillStyle = '#FFF'; // Brillo
        ictx.fillRect(10, 14, 1, 1); ictx.fillRect(20, 14, 1, 1);
        // Nariz Roja
        ictx.fillStyle = '#E74C3C';
        ictx.fillRect(14, 18, 4, 4);
        ictx.fillStyle = '#FFF'; // Brillo nariz
        ictx.fillRect(15, 19, 1, 1);
        // Boca sonriente
        ictx.fillStyle = '#000';
        ictx.fillRect(12, 23, 8, 1);
        ictx.fillRect(11, 22, 1, 1); ictx.fillRect(20, 22, 1, 1);

        clownImages.push(imgCanvas);
    }
}

// --- LÓGICA DEL JUEGO ---

function startGame() {
    uiStart.classList.add('hidden');
    level = 1;
    gameState = 'PLAYING';
    initLevel();
}

function initLevel() {
    hideUILayers();
    cards = [];
    selected = [];
    canClick = false;
    gameState = 'PLAYING';
    
    // Resolución fija para el canvas
    canvas.width = 600; 
    canvas.height = 600;

    // Cartas: Nivel 1=4 (2x2), Nivel 2=6 (2x3...), Nivel 7=16 (4x4)
    let numPairs = level + 1;
    let currentImages = clownImages.slice(0, numPairs); 
    let deck = [...currentImages, ...currentImages];
    // Mezcla aleatoria
    deck.sort(() => Math.random() - 0.5);

    // Rejilla
    const totalCards = deck.length;
    const cols = Math.ceil(Math.sqrt(totalCards));
    const rows = Math.ceil(totalCards / cols);
    
    // Ajuste de tamaño para mobile
    const gap = 10;
    const size = Math.min(
        (canvas.width - (cols + 1) * gap) / cols,
        (canvas.height - (rows + 1) * gap) / rows
    );

    // Centrado de la rejilla
    const gridWidth = cols * (size + gap) - gap;
    const gridHeight = rows * (size + gap) - gap;
    const offsetX = (canvas.width - gridWidth) / 2;
    const offsetY = (canvas.height - gridHeight) / 2;

    deck.forEach((imgCanvas, i) => {
        const col = i % cols;
        const row = Math.floor(i / cols);
        const x = offsetX + col * (size + gap);
        const y = offsetY + row * (size + gap);
        cards.push({ img: imgCanvas, x, y, size, flipped: true, matched: false, shake: 0 });
    });

    draw();

    // Mostrar 0.8 segundos y voltear
    setTimeout(() => {
        cards.forEach(c => c.flipped = false);
        canClick = true;
        draw();
    }, 800);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    cards.forEach(card => {
        ctx.save();
        
        // Temblor
        if (card.shake > 0) {
            ctx.translate(Math.sin(Date.now() * 0.2) * 8, 0); // Temblor más rápido
            card.shake--;
        }

        const radius = 10;
        ctx.beginPath();
        ctx.moveTo(card.x + radius, card.y);
        ctx.lineTo(card.x + card.size - radius, card.y);
        ctx.quadraticCurveTo(card.x + card.size, card.y, card.x + card.size, card.y + radius);
        ctx.lineTo(card.x + card.size, card.y + card.size - radius);
        ctx.quadraticCurveTo(card.x + card.size, card.y + card.size, card.x + card.size - radius, card.y + card.size);
        ctx.lineTo(card.x + radius, card.y + card.size);
        ctx.quadraticCurveTo(card.x, card.y + card.size, card.x, card.y + card.size - radius);
        ctx.lineTo(card.x, card.y + radius);
        ctx.quadraticCurveTo(card.x, card.y, card.x + radius, card.y);
        ctx.closePath();

        if (card.flipped || card.matched) {
            // Fondo carta volteada
            ctx.fillStyle = '#ecf0f1';
            ctx.fill();
            // Dibujar payasito pixel art escalado
            const imgSize = card.size * 0.8;
            const imgOffset = (card.size - imgSize) / 2;
            ctx.drawImage(card.img, card.x + imgOffset, card.y + imgOffset, imgSize, imgSize);
        } else {
            // Fondo trasera carta
            ctx.fillStyle = '#2980b9';
            ctx.fill();
            ctx.fillStyle = '#3498db';
            ctx.fillRect(card.x + card.size*0.1, card.y + card.size*0.1, card.size*0.8, card.size*0.8);
        }
        
        ctx.lineWidth = 4;
        ctx.strokeStyle = '#2c3e50';
        ctx.stroke();
        
        ctx.restore();
    });

    // Loop de animación si hay temblor
    if (cards.some(c => c.shake > 0)) {
        requestAnimationFrame(draw);
    }
}

// --- INTERACCIÓN ---

// Unifica Touch y Mouse
canvas.addEventListener('pointerdown', handlePointerDown);

function handlePointerDown(e) {
    if (!canClick || gameState !== 'PLAYING') return;
    
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const mouseX = (e.clientX - rect.left) * scaleX;
    const mouseY = (e.clientY - rect.top) * scaleY;

    cards.forEach(card => {
        if (!card.flipped && !card.matched &&
            mouseX > card.x && mouseX < card.x + card.size &&
            mouseY > card.y && mouseY < card.y + card.size) {
            
            card.flipped = true;
            selected.push(card);
            draw();

            if (selected.length === 2) {
                checkMatch();
            }
        }
    });
}

function checkMatch() {
    canClick = false;
    const [c1, c2] = selected;

    // Comparamos el canvas de la imagen directamente
    if (c1.img === c2.img) {
        c1.matched = c2.matched = true;
        selected = [];
        canClick = true;
        // Dibujo inmediato para asegurar que se vea la última carta volteada
        draw(); 
        if (cards.every(c => c.matched)) showLevelWin();
    } else {
        setTimeout(() => {
            // Iniciar temblor
            c1.shake = c2.shake = 15; 
            requestAnimationFrame(draw); // Iniciar loop animación

            setTimeout(() => {
                c1.flipped = c2.flipped = false;
                selected = [];
                canClick = true;
                draw();
            }, 300); // Tiempo temblando
        }, 500); // Tiempo antes de temblar
    }
}

// --- GESTIÓN DE PANTALLAS (UI) ---

function hideUILayers() {
    uiStart.classList.add('hidden');
    uiNext.classList.add('hidden');
    uiEnd.classList.add('hidden');
}

function showLevelWin() {
    gameState = 'LEVEL_WIN';
    levelReportText.innerText = `Nivel ${level} completado con ${level+1} parejas.`;
    uiNext.classList.remove('hidden');
}

function nextLevel() {
    if (level < 7) {
        level++;
        initLevel();
    } else {
        showGameEnd();
    }
}

function showGameEnd() {
    gameState = 'GAME_OVER';
    hideUILayers();
    uiEnd.classList.remove('hidden');
}

function resetGame() {
    level = 1;
    gameState = 'MENU';
    hideUILayers();
    uiStart.classList.remove('hidden');
}

// --- INICIALIZACIÓN ---
createClownPlaceholders();
// Mostramos la pantalla de inicio al cargar
hideUILayers();
uiStart.classList.remove('hidden');

</script>
</body>
</html>
