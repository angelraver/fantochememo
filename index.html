<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Memoria - Payasitos</title>
    <style>
        body {
            margin: 0; background: white; color: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden; font-family: sans-serif;
        }
        #game-container {
            position: relative; width: 90%; max-width: 500px;
            aspect-ratio: 1 / 1;
        }
        canvas {
            background: white; width: 100%; height: 100%;
            touch-action: none; image-rendering: pixelated;
        }
        .ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 20px;
            box-sizing: border-box;
            opacity: 1; transition: opacity 0.5s;
        }
        .hidden { display: none !important; opacity: 0; }
        
        button {
            padding: 15px 30px; cursor: pointer; background: #e74c3c; color: white;
            border: 4px solid #b03a2e; border-radius: 8px; font-size: 1.2em;
            font-family: inherit; text-transform: uppercase;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.95); }
        
        h1 { font-size: 2em; color: #000000; }
        h2 { font-size: 1.5em; color: #000000; }
        p { font-size: 1em; color: #ecf0f1; }
        
        #ui-start {
            background: white !important;
        }
        
        #ui-level {
            background: white !important;
        }
        
        #ui-next {
            background: white !important;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>

    <div id="ui-loading" class="ui-layer">
        <h1>Un momentito por favor...</h1>
    </div>

    <div id="ui-start" class="ui-layer hidden">
        <img id="title-img" src="img/game-logo.png" alt="Title" style="max-width: 80%; margin-bottom: 20px;">
        <img id="instructions-img" src="img/instructions.png" alt="Instructions" style="max-width: 80%; margin-bottom: 30px;">
        <img id="jugar-img" src="img/jugar.png" alt="Jugar" style="max-width: 70%; cursor: pointer;" onclick="startGame()">
    </div>

    <div id="ui-level" class="ui-layer hidden">
        <img id="level-img" src="" alt="Level" style="max-width: 80%;">
    </div>

    <div id="ui-next" class="ui-layer hidden">
        <img id="done-img" src="img/done.png" alt="Done" style="max-width: 80%; margin-bottom: 30px;">
        <img id="siguiente-img" src="img/siguiente.png" alt="Siguiente" style="max-width: 70%; cursor: pointer;" onclick="nextLevel()">
    </div>

    <div id="ui-end" class="ui-layer hidden">
        <h1>¡Felicitaciones!</h1>
        <p>Lograste completar el juego de los payasitos.</p>
        <button onclick="resetGame()">Jugar de nuevo</button>
    </div>
</div>

<script type="module" src="/src/game.js"></script>
</body>
</html>
